version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: issueradar-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - issueradar-network

  redis:
    image: redis:7-alpine
    container_name: issueradar-redis-prod
    restart: always
    command: redis-server --save 60 1 --loglevel notice
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - issueradar-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: issueradar-api-prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - issueradar-network

  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: issueradar-worker-prod
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
    depends_on:
      - api
      - redis
    networks:
      - issueradar-network

  celery_beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: issueradar-beat-prod
    restart: always
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - issueradar-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: issueradar-web-prod
    restart: always
    depends_on:
      - api
    networks:
      - issueradar-network

  nginx_proxy:
    image: nginx:1.25-alpine
    container_name: issueradar-proxy-prod
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - issueradar-network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  issueradar-network:
    driver: bridge
