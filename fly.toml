# Fly.io Application Specification for IssueRadar AI Backend

app = "issueradar-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  AI_PROVIDER = "gemini"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop_app"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/live"
  protocol = "http"
  timeout = "5s"
  tls_skip_verify = false

[[http_service.checks]]
  grace_period = "15s"
  interval = "60s"
  method = "GET"
  path = "/ready"
  protocol = "http"
  timeout = "5s"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
