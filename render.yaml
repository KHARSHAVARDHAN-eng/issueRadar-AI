services:
  # FastAPI Backend API Service
  - type: web
    name: issueradar-api
    env: python
    region: oregon
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: issueradar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: issueradar-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: issueradar-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: issueradar-redis
          property: connectionString
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false

  # Celery Background Worker Service
  - type: worker
    name: issueradar-worker
    env: python
    region: oregon
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && celery -A app.core.celery_app.celery_app worker --loglevel=info
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: issueradar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: issueradar-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: issueradar-redis
          property: connectionString

databases:
  - name: issueradar-db
    databaseName: issueradar_prod
    user: issueradar_user
    region: oregon
