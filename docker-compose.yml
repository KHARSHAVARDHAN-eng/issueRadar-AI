version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: issueradar_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-issueradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-issueradar_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-issueradar_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-issueradar} -d ${POSTGRES_DB:-issueradar_db}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: issueradar_redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: issueradar_api
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - API_PORT=${API_PORT:-8000}
      - API_HOST=${API_HOST:-0.0.0.0}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://issueradar:issueradar_secret_password@postgres:5432/issueradar_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    ports:
      - '${API_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: issueradar_web
    ports:
      - '3000:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
